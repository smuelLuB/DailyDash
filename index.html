
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { position: relative; overflow: hidden; min-height: 600px; }
.dash { max-width: 520px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }
.date-header { font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.25rem; }
.today-label { font-size: 28px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
.top-bar-left { display: flex; flex-direction: column; }
.icon-row { display: flex; gap: 8px; }
.icon-btn { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: var(--text-secondary); transition: border-color 0.15s; }
.icon-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.progress-bar { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 2rem; overflow: hidden; }
.progress-fill { height: 100%; background: var(--fill-accent); border-radius: 99px; transition: width 0.3s ease; }
.section { margin-bottom: 1.75rem; }
.section-title { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; border-bottom: 0.5px solid var(--border); padding-bottom: 0.5rem; }

.habits { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.habit-card { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.15s; user-select: none; }
.habit-card.done { background: var(--bg-success); border-color: var(--border-success); }
.habit-card.done .habit-icon, .habit-card.done .habit-label, .habit-card.done .habit-sub { color: var(--text-success); }
.habit-icon { font-size: 22px; color: var(--text-secondary); }
.habit-label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.habit-sub { font-size: 11px; color: var(--text-muted); }
.check-dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; color: transparent; font-size: 11px; }
.habit-card.done .check-dot { background: var(--fill-success); border-color: var(--fill-success); color: white; }

.ball-roller-box { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.ball-roller-left { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
.ball-roller-badge { font-size: 10px; font-weight: 600; color: var(--text-accent); letter-spacing: 0.06em; text-transform: uppercase; }
.ball-roller-sub { font-size: 10px; color: var(--text-muted); font-style: italic; white-space: nowrap; }
.ball-roller-divider { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }
.ball-roller-input { flex: 1; background: transparent; border: none; font-size: 15px; color: var(--text-primary); outline: none; font-family: var(--font-sans); }
.ball-roller-input::placeholder { color: var(--text-muted); }
.ball-roller-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border-strong); cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 12px; flex-shrink: 0; transition: all 0.15s; background: transparent; }
.ball-roller-check.done { background: var(--fill-pro); border-color: var(--fill-pro); color: white; }
.ball-roller-box.done-state { background: var(--bg-pro); border-color: var(--border-pro); }
.ball-roller-box.done-state .ball-roller-input { text-decoration: line-through; opacity: 0.5; }

.tasks-list { display: flex; flex-direction: column; gap: 10px; }
.mit-row { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.mit-badge { font-size: 10px; font-weight: 700; color: var(--text-warning); background: var(--bg-warning); border: 0.5px solid var(--border-warning); border-radius: 6px; padding: 3px 7px; white-space: nowrap; flex-shrink: 0; }
.mit-input { flex: 1; background: transparent; border: none; font-size: 16px; font-weight: 500; color: var(--text-primary); outline: none; font-family: var(--font-sans); }
.mit-input::placeholder { color: var(--text-muted); font-weight: 400; }
.mit-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border-strong); cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 12px; flex-shrink: 0; transition: all 0.15s; background: transparent; }
.mit-check.done { background: var(--fill-warning); border-color: var(--fill-warning); color: white; }
.mit-row.done-state { background: var(--bg-warning); border-color: var(--border-warning); }
.mit-row.done-state .mit-input { text-decoration: line-through; opacity: 0.5; }
.task-row { display: flex; align-items: center; gap: 12px; padding: 4px 0 4px 2px; }
.task-num { font-size: 13px; font-weight: 500; color: var(--text-muted); width: 16px; flex-shrink: 0; }
.task-input { flex: 1; background: transparent; border: none; border-bottom: 0.5px solid var(--border); padding: 7px 0; font-size: 15px; color: var(--text-primary); outline: none; font-family: var(--font-sans); }
.task-input::placeholder { color: var(--text-muted); }
.task-input:focus { border-bottom-color: var(--fill-accent); }
.task-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-strong); cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 11px; flex-shrink: 0; transition: all 0.15s; background: transparent; }
.task-check.done { background: var(--fill-accent); border-color: var(--fill-accent); color: white; }

.deep-work { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.block-card { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; user-select: none; }
.block-card.done { background: var(--bg-accent); border-color: var(--border-accent); }
.block-icon { font-size: 18px; color: var(--text-secondary); }
.block-card.done .block-icon { color: var(--text-accent); }
.block-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.block-card.done .block-name { color: var(--text-accent); }
.block-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.block-dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; color: transparent; font-size: 10px; flex-shrink: 0; margin-left: auto; }
.block-card.done .block-dot { background: var(--fill-accent); border-color: var(--fill-accent); color: white; }

.shutdown-list { display: flex; flex-direction: column; gap: 8px; }
.sd-row { display: flex; align-items: center; gap: 12px; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 16px; cursor: pointer; user-select: none; transition: all 0.15s; }
.sd-row.done { background: var(--bg-warning); border-color: var(--border-warning); }
.sd-icon { font-size: 18px; color: var(--text-secondary); }
.sd-row.done .sd-icon { color: var(--text-warning); }
.sd-text { flex: 1; font-size: 14px; color: var(--text-primary); }
.sd-row.done .sd-text { color: var(--text-warning); }
.sd-dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; color: transparent; font-size: 11px; flex-shrink: 0; }
.sd-row.done .sd-dot { background: var(--fill-warning); border-color: var(--fill-warning); color: white; }
.help-btn { background: transparent; border: 0.5px solid var(--border-strong); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 11px; font-weight: 600; flex-shrink: 0; font-family: var(--font-sans); }
.help-btn:hover { color: var(--text-primary); border-color: var(--border-strong); }

.reset-btn { background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 11px; margin-top: 1.5rem; display: block; margin-left: auto; }

/* OVERLAY & DRAWER */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 10; }
.overlay.open { opacity: 1; pointer-events: all; }
.drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(420px, 96vw); background: var(--surface-2); border-left: 0.5px solid var(--border); transform: translateX(100%); transition: transform 0.3s ease; z-index: 20; display: flex; flex-direction: column; overflow: hidden; }
.drawer.open { transform: translateX(0); }
.drawer-header { display: flex; align-items: center; gap: 12px; padding: 1.25rem 1.25rem 1rem; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.drawer-title { font-size: 16px; font-weight: 600; color: var(--text-primary); flex: 1; }
.drawer-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.close-btn { background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 22px; display: flex; align-items: center; }
.drawer-body { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; }

/* BRAIN RESET PROMPTS */
.prompt-block { display: flex; flex-direction: column; gap: 6px; }
.prompt-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
.prompt-label i { font-size: 14px; }
.prompt-ta {
  width: 100%; background: var(--surface-1); border: 0.5px solid var(--border);
  border-radius: 10px; padding: 10px 12px; font-size: 14px; line-height: 1.65;
  color: var(--text-primary); font-family: var(--font-sans); resize: none; outline: none;
  min-height: 72px; transition: border-color 0.15s;
}
.prompt-ta:focus { border-color: var(--fill-accent); }
.prompt-ta::placeholder { color: var(--text-muted); }
.prompt-hint { font-size: 11px; color: var(--text-muted); padding-left: 2px; }

.mark-done-row { display: flex; align-items: center; gap: 10px; padding: 12px 0 4px; border-top: 0.5px solid var(--border); margin-top: 4px; }
.mark-done-btn {
  flex: 1; background: var(--bg-warning); border: 0.5px solid var(--border-warning);
  border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600;
  color: var(--text-warning); cursor: pointer; font-family: var(--font-sans);
  transition: opacity 0.15s;
}
.mark-done-btn:hover { opacity: 0.85; }
.mark-done-btn.done { background: var(--fill-warning); border-color: var(--fill-warning); color: white; }

/* WATER */
.drawer-section-title { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }
.water-display { display: flex; align-items: baseline; gap: 8px; margin-bottom: 1rem; }
.water-num { font-size: 36px; font-weight: 500; color: var(--text-primary); }
.water-goal { font-size: 13px; color: var(--text-muted); }
.water-prog { height: 5px; background: var(--border); border-radius: 99px; margin-bottom: 1.25rem; overflow: hidden; }
.water-prog-fill { height: 100%; background: #378ADD; border-radius: 99px; transition: width 0.3s ease; }
.water-cups { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
.cup { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
.cup.filled { background: #E6F1FB; border-color: #B5D4F4; }
.cup i { font-size: 20px; color: var(--text-muted); }
.cup.filled i { color: #185FA5; }
.cup span { font-size: 10px; color: var(--text-muted); }
.cup.filled span { color: #185FA5; }
.water-actions { display: flex; gap: 8px; }
.water-actions input { flex: 1; font-size: 14px; font-family: var(--font-sans); }
.water-actions button { font-size: 13px; font-weight: 500; white-space: nowrap; }
.notes-area { width: 100%; min-height: 280px; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px; font-size: 15px; line-height: 1.7; color: var(--text-primary); font-family: var(--font-sans); resize: none; outline: none; }
.notes-area:focus { border-color: var(--fill-accent); }
.notes-area::placeholder { color: var(--text-muted); }
.notes-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 6px; }

/* ENV POPUP */
.popup-back { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 30; display: flex; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
.popup-back.open { opacity: 1; pointer-events: all; }
.popup { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 16px; padding: 1.5rem; max-width: 380px; width: 100%; }
.popup-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 0.75rem; }
.popup-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.popup-close { background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; }
.popup-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem; }
.popup-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.popup-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--text-primary); line-height: 1.5; }
.popup-list li::before { content: '□'; font-size: 16px; color: var(--text-muted); flex-shrink: 0; }
</style>

<div class="app">
  <div class="dash">
    <div class="top-bar">
      <div class="top-bar-left">
        <div class="date-header" id="date-label"></div>
        <div class="today-label">Today</div>
      </div>
      <div class="icon-row">
        <div class="icon-btn" onclick="openDrawer('water')" aria-label="Water tracker"><i class="ti ti-droplet"></i></div>
        <div class="icon-btn" onclick="openDrawer('notes')" aria-label="Brain dump"><i class="ti ti-notes"></i></div>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

    <div class="section">
      <div class="section-title">Habits</div>
      <div class="habits">
        <div class="habit-card" id="hab-sleep" onclick="toggleHabit('sleep')">
          <i class="ti ti-moon habit-icon"></i>
          <div class="habit-label">Sleep</div><div class="habit-sub">7–9 hrs</div>
          <div class="check-dot">✓</div>
        </div>
        <div class="habit-card" id="hab-exercise" onclick="toggleHabit('exercise')">
          <i class="ti ti-run habit-icon"></i>
          <div class="habit-label">Exercise</div><div class="habit-sub">move</div>
          <div class="check-dot">✓</div>
        </div>
        <div class="habit-card" id="hab-water" onclick="toggleHabit('water')">
          <i class="ti ti-droplet habit-icon"></i>
          <div class="habit-label">Water</div><div class="habit-sub">2–3 L</div>
          <div class="check-dot">✓</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="ball-roller-box" id="br-box">
        <div class="ball-roller-left">
          <div class="ball-roller-badge">⚽ Ball Roller</div>
          <div class="ball-roller-sub">gets the day rolling</div>
        </div>
        <div class="ball-roller-divider"></div>
        <input class="ball-roller-input" id="br-input" placeholder="What kicks things off?" oninput="save()" />
        <button class="ball-roller-check" id="br-check" onclick="toggleBR()" aria-label="Mark done">✓</button>
      </div>
    </div>

    <div class="section">
      <div class="tasks-list">
        <div class="mit-row" id="mit-row">
          <div class="mit-badge">MIT</div>
          <input class="mit-input" id="mit" placeholder="Most important task" oninput="save()" />
          <button class="mit-check" id="mit-check" onclick="toggleMIT()" aria-label="Mark MIT done">✓</button>
        </div>
        <div class="task-row">
          <div class="task-num">2</div>
          <input class="task-input" id="t2" placeholder="Second priority" oninput="save()" />
          <button class="task-check" id="t2c" onclick="toggleTask(2)" aria-label="Mark task 2 done">✓</button>
        </div>
        <div class="task-row">
          <div class="task-num">3</div>
          <input class="task-input" id="t3" placeholder="Third priority" oninput="save()" />
          <button class="task-check" id="t3c" onclick="toggleTask(3)" aria-label="Mark task 3 done">✓</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Deep work</div>
      <div class="deep-work">
        <div class="block-card" id="dw-1" onclick="toggleBlock(1)">
          <i class="ti ti-brain block-icon"></i>
          <div><div class="block-name">Block 1</div><div class="block-sub">morning</div></div>
          <div class="block-dot">✓</div>
        </div>
        <div class="block-card" id="dw-2" onclick="toggleBlock(2)">
          <i class="ti ti-brain block-icon"></i>
          <div><div class="block-name">Block 2</div><div class="block-sub">afternoon</div></div>
          <div class="block-dot">✓</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Shutdown ritual</div>
      <div class="shutdown-list">
        <div class="sd-row" id="sd-plan" onclick="toggleSD('plan')">
          <i class="ti ti-calendar-check sd-icon"></i>
          <div class="sd-text">Tomorrow planned</div>
          <div class="sd-dot">✓</div>
        </div>
        <div class="sd-row" id="sd-brain" onclick="toggleSD('brain')">
          <i class="ti ti-brain sd-icon"></i>
          <div class="sd-text">Brain reset</div>
          <button class="help-btn" onclick="openDrawer('brain-reset', event)" aria-label="Open brain reset">?</button>
          <div class="sd-dot">✓</div>
        </div>
        <div class="sd-row" id="sd-env" onclick="toggleSD('env')">
          <i class="ti ti-plant sd-icon"></i>
          <div class="sd-text">Environment reset</div>
          <button class="help-btn" onclick="openHelp('env', event)" aria-label="What is environment reset?">?</button>
          <div class="sd-dot">✓</div>
        </div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetDay()">↺ Reset for new day</button>
  </div>

  <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer" role="dialog" aria-modal="true">
    <div class="drawer-header">
      <div style="flex:1">
        <div class="drawer-title" id="drawer-title"></div>
        <div class="drawer-subtitle" id="drawer-subtitle"></div>
      </div>
      <button class="close-btn" onclick="closeDrawer()"><i class="ti ti-x"></i></button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>

  <div class="popup-back" id="popup-back" onclick="closeHelp()">
    <div class="popup" onclick="event.stopPropagation()">
      <div class="popup-header">
        <div class="popup-title" id="popup-title"></div>
        <button class="popup-close" onclick="closeHelp()"><i class="ti ti-x"></i></button>
      </div>
      <div class="popup-desc" id="popup-desc"></div>
      <ul class="popup-list" id="popup-list"></ul>
    </div>
  </div>
</div>

<script>
const TODAY = new Date().toDateString();
const KEY = 'adhd_v5';

function getState() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY) || '{}');
    if (s.date !== TODAY) return { date:TODAY, habits:{}, br:'', brDone:false, mit:'', mitDone:false, tasks:{}, taskDone:{}, dw:{}, sd:{}, water:0, notes:s.notes||'', brPrompts:{} };
    if (!s.brPrompts) s.brPrompts = {};
    return s;
  } catch { return { date:TODAY, habits:{}, br:'', brDone:false, mit:'', mitDone:false, tasks:{}, taskDone:{}, dw:{}, sd:{}, water:0, notes:'', brPrompts:{} }; }
}
function persist(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e){} }

function toggleHabit(k) { const s=getState(); s.habits[k]=!s.habits[k]; persist(s); render(s); }
function toggleBR()     { const s=getState(); s.brDone=!s.brDone;       persist(s); render(s); }
function toggleMIT()    { const s=getState(); s.mitDone=!s.mitDone;     persist(s); render(s); }
function toggleTask(n)  { const s=getState(); s.taskDone[n]=!s.taskDone[n]; persist(s); render(s); }
function toggleBlock(n) { const s=getState(); s.dw[n]=!s.dw[n];         persist(s); render(s); }
function toggleSD(k)    { const s=getState(); s.sd[k]=!s.sd[k];         persist(s); render(s); }

function save() {
  const s=getState();
  s.br = document.getElementById('br-input').value;
  s.mit = document.getElementById('mit').value;
  s.tasks = { 2: document.getElementById('t2').value, 3: document.getElementById('t3').value };
  persist(s); updateProgress(s);
}

function saveBrPrompt(key) {
  const el = document.getElementById('bp-'+key);
  if (!el) return;
  const s = getState();
  s.brPrompts[key] = el.value;
  persist(s);
}

function markBrainResetDone() {
  const s = getState();
  s.sd.brain = !s.sd.brain;
  persist(s); render(s);
  const btn = document.getElementById('br-done-btn');
  if (btn) btn.className = 'mark-done-btn' + (s.sd.brain ? ' done' : '');
}

function resetDay() {
  const notes = getState().notes||'';
  persist({ date:TODAY, habits:{}, br:'', brDone:false, mit:'', mitDone:false, tasks:{}, taskDone:{}, dw:{}, sd:{}, water:0, notes, brPrompts:{} });
  render(getState());
  ['br-input','mit','t2','t3'].forEach(id => document.getElementById(id).value='');
}

function render(s) {
  ['sleep','exercise','water'].forEach(h => document.getElementById('hab-'+h).classList.toggle('done', !!s.habits[h]));
  if (s.br && !document.getElementById('br-input').value) document.getElementById('br-input').value = s.br;
  document.getElementById('br-check').classList.toggle('done', !!s.brDone);
  document.getElementById('br-box').classList.toggle('done-state', !!s.brDone);
  if (s.mit && !document.getElementById('mit').value) document.getElementById('mit').value = s.mit;
  document.getElementById('mit-check').classList.toggle('done', !!s.mitDone);
  document.getElementById('mit-row').classList.toggle('done-state', !!s.mitDone);
  [2,3].forEach(n => {
    const inp = document.getElementById('t'+n);
    if (s.tasks&&s.tasks[n]&&!inp.value) inp.value = s.tasks[n];
    document.getElementById('t'+n+'c').classList.toggle('done', !!s.taskDone[n]);
    inp.style.textDecoration = s.taskDone[n] ? 'line-through' : '';
    inp.style.opacity = s.taskDone[n] ? '0.45' : '1';
  });
  [1,2].forEach(n => document.getElementById('dw-'+n).classList.toggle('done', !!s.dw[n]));
  ['plan','brain','env'].forEach(k => document.getElementById('sd-'+k).classList.toggle('done', !!s.sd[k]));
  updateProgress(s);
}

function updateProgress(s) {
  const checks = [s.habits.sleep,s.habits.exercise,s.habits.water,s.brDone,s.mitDone,s.taskDone[2],s.taskDone[3],s.dw[1],s.dw[2],s.sd.plan,s.sd.brain,s.sd.env];
  document.getElementById('progress').style.width = Math.round(checks.filter(Boolean).length/checks.length*100)+'%';
}

const BRAIN_PROMPTS = [
  { key:'loops',  icon:'ti-infinity',      label:'Open loops',         placeholder:'What\'s still unfinished or nagging at you?',          hint:'Get it out of your head and onto the page.' },
  { key:'worry',  icon:'ti-alert-circle',  label:'Worries',            placeholder:'Anything you\'re anxious about forgetting?',           hint:'Writing it down means your brain can let go.' },
  { key:'wins',   icon:'ti-trophy',        label:'Wins today',         placeholder:'What did you actually get done?',                      hint:'Even small things count.' },
  { key:'tmit',   icon:'ti-bolt',          label:'Tomorrow\'s MIT',    placeholder:'What\'s the one thing that matters most tomorrow?',    hint:'Set it now so you start with clarity.' },
  { key:'other',  icon:'ti-brain',         label:'Anything else',      placeholder:'Stray thoughts, ideas, things to remember…',          hint:'Clear the buffer.' },
];

function buildBrainReset() {
  const s = getState();
  const done = !!s.sd.brain;
  const rows = BRAIN_PROMPTS.map(p => `
    <div class="prompt-block">
      <div class="prompt-label"><i class="ti ${p.icon}"></i> ${p.label}</div>
      <textarea class="prompt-ta" id="bp-${p.key}" placeholder="${p.placeholder}" oninput="saveBrPrompt('${p.key}')">${s.brPrompts[p.key]||''}</textarea>
      <div class="prompt-hint">${p.hint}</div>
    </div>`).join('');

  return rows + `
    <div class="mark-done-row">
      <button class="mark-done-btn${done?' done':''}" id="br-done-btn" onclick="markBrainResetDone()">
        ${done ? '✓ Brain reset done' : 'Mark brain reset done'}
      </button>
    </div>`;
}

function openDrawer(type, e) {
  if (e) e.stopPropagation();
  if (type === 'brain-reset') {
    document.getElementById('drawer-title').textContent = '🧠 Brain reset';
    document.getElementById('drawer-subtitle').textContent = 'Work through these before you shut down';
    document.getElementById('drawer-body').innerHTML = buildBrainReset();
  } else if (type === 'water') {
    document.getElementById('drawer-title').textContent = 'Water tracker';
    document.getElementById('drawer-subtitle').textContent = '';
    document.getElementById('drawer-body').innerHTML = buildWater();
  } else {
    document.getElementById('drawer-title').textContent = 'Brain dump';
    document.getElementById('drawer-subtitle').textContent = 'Carries over day to day';
    document.getElementById('drawer-body').innerHTML = buildNotes();
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function buildWater() {
  const s=getState(),ml=s.water||0,pct=Math.min(100,Math.round(ml/2500*100));
  const disp=ml>=1000?(ml/1000).toFixed(1)+'L':ml+'ml';
  const cups=Array.from({length:8},(_,i)=>{const t=(i+1)*250,f=ml>=t,lbl=t<1000?t+'ml':(t/1000)+'L';return`<div class="cup ${f?'filled':''}" onclick="setWater(${t})"><i class="ti ti-glass-full"></i><span>${lbl}</span></div>`;}).join('');
  return `<div class="drawer-section-title">Today's intake</div>
  <div class="water-display"><span class="water-num" id="w-num">${disp}</span><span class="water-goal">of 2.5L goal</span></div>
  <div class="water-prog"><div class="water-prog-fill" id="w-bar" style="width:${pct}%"></div></div>
  <div class="water-cups" id="w-cups">${cups}</div>
  <div class="water-actions"><input type="number" id="w-in" placeholder="Add ml…" min="1" max="2000" inputmode="numeric"/><button onclick="addWater()">Add</button><button onclick="setWater(0)">Reset</button></div>`;
}
function setWater(ml){const s=getState();s.water=ml;persist(s);refreshWater(s);}
function addWater(){const inp=document.getElementById('w-in'),v=parseInt(inp.value);if(!v||v<=0)return;const s=getState();s.water=Math.min(5000,(s.water||0)+v);persist(s);inp.value='';refreshWater(s);}
function refreshWater(s){
  const ml=s.water||0,pct=Math.min(100,Math.round(ml/2500*100)),disp=ml>=1000?(ml/1000).toFixed(1)+'L':ml+'ml';
  const n=document.getElementById('w-num'),b=document.getElementById('w-bar'),c=document.getElementById('w-cups');
  if(n)n.textContent=disp;if(b)b.style.width=pct+'%';
  if(c)c.innerHTML=Array.from({length:8},(_,i)=>{const t=(i+1)*250,f=ml>=t,lbl=t<1000?t+'ml':(t/1000)+'L';return`<div class="cup ${f?'filled':''}" onclick="setWater(${t})"><i class="ti ti-glass-full"></i><span>${lbl}</span></div>`;}).join('');
}
function buildNotes(){const s=getState(),notes=s.notes||'';return`<textarea class="notes-area" id="notes-ta" placeholder="Thoughts, worries, ideas, things you don't want to forget…" oninput="saveNotes()">${notes}</textarea><div class="notes-count" id="notes-count">${notes.length} chars</div>`;}
function saveNotes(){const ta=document.getElementById('notes-ta');if(!ta)return;const s=getState();s.notes=ta.value;persist(s);const c=document.getElementById('notes-count');if(c)c.textContent=ta.value.length+' chars';}

const ENV_HELP = {
  title:'Environment reset (5 min)',
  desc:'A quick tidy that makes tomorrow\'s you feel like they\'re starting from a good place, not digging out.',
  items:['Fill water bottle','Put things back where they belong','Put tomorrow\'s essentials somewhere obvious','Remove one distraction','Make tomorrow\'s first task easy to start']
};
function openHelp(type,e){
  e.stopPropagation();
  const c=ENV_HELP;
  document.getElementById('popup-title').textContent=c.title;
  document.getElementById('popup-desc').textContent=c.desc;
  document.getElementById('popup-list').innerHTML=c.items.map(i=>`<li>${i}</li>`).join('');
  document.getElementById('popup-back').classList.add('open');
}
function closeHelp(){document.getElementById('popup-back').classList.remove('open');}

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const now=new Date();
document.getElementById('date-label').textContent=DAYS[now.getDay()]+', '+MONTHS[now.getMonth()]+' '+now.getDate();
render(getState());
