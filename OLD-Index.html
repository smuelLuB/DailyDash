<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f8f8f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a1a18" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Dashboard" />
  <title>Daily Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css" />
  <style>
    /* ── DESIGN TOKENS ───────────────────────────────────────────── */
    :root {
      /* backgrounds */
      --bg:        #f8f8f7;
      --surface:   #ffffff;
      --surface-2: #f2f2f0;
      /* borders */
      --border:        rgba(0,0,0,0.09);
      --border-strong: rgba(0,0,0,0.18);
      /* text */
      --text:           #1a1a18;
      --text-secondary: #5a5a57;
      --text-muted:     #9a9a96;
      /* accent – blue */
      --accent:        #185FA5;
      --accent-bg:     #E6F1FB;
      --accent-border: #B5D4F4;
      --accent-text:   #0d3d6e;
      /* success – green */
      --success:        #0F6E56;
      --success-bg:     #E1F5EE;
      --success-border: #9FE1CB;
      /* warning – amber */
      --warning:        #854F0B;
      --warning-bg:     #FAEEDA;
      --warning-border: #FAC775;
      /* misc */
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #1a1a18;
        --surface:   #242422;
        --surface-2: #2e2e2c;
        --border:        rgba(255,255,255,0.09);
        --border-strong: rgba(255,255,255,0.18);
        --text:           #f0f0ee;
        --text-secondary: #a8a8a4;
        --text-muted:     #6a6a66;
        --accent:        #378ADD;
        --accent-bg:     #0c2a44;
        --accent-border: #1a4f80;
        --accent-text:   #7bbdf5;
        --success:        #1D9E75;
        --success-bg:     #062820;
        --success-border: #0F6E56;
        --warning:        #EF9F27;
        --warning-bg:     #2a1a04;
        --warning-border: #854F0B;
      }
    }

    /* ── RESET ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      overscroll-behavior: none;
    }

    /* ── LAYOUT ──────────────────────────────────────────────────── */
    .app  { min-height: 100dvh; padding-top: env(safe-area-inset-top, 0); }
    .dash { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem calc(env(safe-area-inset-bottom,0) + 4rem); }

    /* ── TOP BAR ─────────────────────────────────────────────────── */
    .top-bar     { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.75rem; }
    .date-label  { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
    .today-label { font-size: 30px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
    .icon-row    { display: flex; gap: 8px; padding-top: 6px; }
    .icon-btn    {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; color: var(--text-secondary);
    }
    .icon-btn:active { background: var(--surface-2); }

    /* ── PROGRESS ────────────────────────────────────────────────── */
    .progress-wrap  { margin-bottom: 2rem; }
    .progress-bar   { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
    .progress-fill  { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }
    .progress-label { font-size: 12px; color: var(--text-muted); }

    /* ── SECTIONS ────────────────────────────────────────────────── */
    .section       { margin-bottom: 2rem; }
    .section-title {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 0.75rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── HABITS ──────────────────────────────────────────────────── */
    .habits     { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .habit-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 8px; min-height: 92px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      cursor: pointer; user-select: none; transition: transform 0.12s, background 0.15s, border-color 0.15s;
    }
    .habit-card:active { transform: scale(0.96); }
    .habit-card.done { background: var(--success-bg); border-color: var(--success-border); }
    .habit-card.done .habit-icon,
    .habit-card.done .habit-name,
    .habit-card.done .habit-sub { color: var(--success); }
    .habit-icon  { font-size: 24px; color: var(--text-secondary); }
    .habit-name  { font-size: 13px; font-weight: 600; color: var(--text); text-align: center; }
    .habit-sub   { font-size: 11px; color: var(--text-muted); text-align: center; }
    .check-circle {
      width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent;
    }
    .habit-card.done .check-circle { background: var(--success); border-color: var(--success); color: #fff; }

    /* ── TOP 3 ───────────────────────────────────────────────────── */
    .top3-list  { display: flex; flex-direction: column; gap: 10px; }
    .top3-row   { display: flex; align-items: center; gap: 12px; }
    .top3-num   { font-size: 14px; font-weight: 600; color: var(--text-muted); width: 18px; flex-shrink: 0; }
    .top3-input {
      flex: 1; background: transparent; border: none;
      border-bottom: 1px solid var(--border); padding: 8px 0;
      font-size: 16px; color: var(--text); outline: none; font-family: var(--font);
    }
    .top3-input::placeholder { color: var(--text-muted); }
    .top3-input:focus        { border-bottom-color: var(--accent); }
    .top3-btn {
      width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border-strong);
      background: transparent; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: transparent; cursor: pointer; flex-shrink: 0; transition: all 0.15s;
    }
    .top3-btn.done { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── MIT ─────────────────────────────────────────────────────── */
    .mit-box   {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; display: flex; align-items: center; gap: 12px;
    }
    .mit-badge {
      font-size: 11px; font-weight: 700; color: var(--warning);
      background: var(--warning-bg); border: 1px solid var(--warning-border);
      border-radius: 6px; padding: 3px 7px; white-space: nowrap; flex-shrink: 0;
    }
    .mit-input {
      flex: 1; background: transparent; border: none;
      font-size: 16px; font-weight: 600; color: var(--text);
      outline: none; font-family: var(--font);
    }
    .mit-input::placeholder { color: var(--text-muted); font-weight: 400; }

    /* ── DEEP WORK ───────────────────────────────────────────────── */
    .deep-work  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .block-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; user-select: none; transition: transform 0.12s, background 0.15s, border-color 0.15s;
    }
    .block-card:active { transform: scale(0.96); }
    .block-card.done   { background: var(--accent-bg); border-color: var(--accent-border); }
    .block-card .bi    { font-size: 20px; color: var(--text-secondary); flex-shrink: 0; }
    .block-card.done .bi { color: var(--accent); }
    .block-name  { font-size: 13px; font-weight: 600; color: var(--text); }
    .block-card.done .block-name { color: var(--accent); }
    .block-sub   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .block-dot   {
      width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: transparent; flex-shrink: 0; margin-left: auto;
    }
    .block-card.done .block-dot { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── SHUTDOWN ────────────────────────────────────────────────── */
    .shutdown-list { display: flex; flex-direction: column; gap: 10px; }
    .sd-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; cursor: pointer; user-select: none;
      transition: transform 0.12s, background 0.15s, border-color 0.15s;
    }
    .sd-row:active { transform: scale(0.98); }
    .sd-row.done   { background: var(--warning-bg); border-color: var(--warning-border); }
    .sd-icon { font-size: 20px; color: var(--text-secondary); flex-shrink: 0; }
    .sd-row.done .sd-icon { color: var(--warning); }
    .sd-text { flex: 1; font-size: 15px; color: var(--text); }
    .sd-row.done .sd-text { color: var(--warning); }
    .sd-dot  {
      width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: transparent; flex-shrink: 0;
    }
    .sd-row.done .sd-dot { background: var(--warning); border-color: var(--warning); color: #fff; }
    .help-btn {
      background: transparent; border: 1px solid var(--border-strong); border-radius: 50%;
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted); font-size: 12px; font-weight: 700; flex-shrink: 0;
      font-family: var(--font);
    }
    .help-btn:active { background: var(--surface-2); }

    /* ── RESET BTN ───────────────────────────────────────────────── */
    .reset-btn {
      background: transparent; border: none; color: var(--text-muted);
      font-size: 13px; cursor: pointer; display: block;
      margin: 1.5rem auto 0; padding: 8px 16px; font-family: var(--font);
    }

    /* ── OVERLAY ─────────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 10;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ── DRAWER ──────────────────────────────────────────────────── */
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: min(380px, 92vw);
      background: var(--surface); border-left: 1px solid var(--border);
      transform: translateX(100%); transition: transform 0.3s ease;
      z-index: 20; display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex; align-items: center; gap: 12px;
      padding: calc(1.25rem + env(safe-area-inset-top,0)) 1.25rem 1rem;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .drawer-title { font-size: 17px; font-weight: 600; color: var(--text); flex: 1; }
    .close-btn {
      background: var(--surface-2); border: none; border-radius: 50%;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; color: var(--text-secondary);
    }
    .drawer-body { flex: 1; overflow-y: auto; padding: 1.25rem; -webkit-overflow-scrolling: touch; }

    /* ── HELP POPUP (bottom sheet) ───────────────────────────────── */
    .popup-back {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 30; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .popup-back.open { opacity: 1; pointer-events: all; }
    .popup {
      background: var(--surface); border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom,0));
      width: 100%; max-height: 82dvh; overflow-y: auto;
      transform: translateY(24px); transition: transform 0.25s ease;
    }
    .popup-back.open .popup { transform: translateY(0); }
    .popup-pill  { width: 40px; height: 4px; background: var(--border-strong); border-radius: 99px; margin: 0 auto 1.25rem; }
    .popup-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    .popup-desc  { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 1.25rem; }
    .popup-list  { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .popup-list li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 15px; color: var(--text); line-height: 1.5;
    }
    .popup-list li::before {
      content: '□'; font-size: 17px; color: var(--text-muted); flex-shrink: 0; margin-top: 1px;
    }
    .popup-close-btn {
      display: block; width: 100%; margin-top: 1.5rem; padding: 14px;
      background: var(--surface-2); border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 600; color: var(--text);
      cursor: pointer; font-family: var(--font);
    }
    .popup-close-btn:active { background: var(--border); }

    /* ── WATER (drawer) ──────────────────────────────────────────── */
    .drawer-section-title {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem;
    }
    .water-display  { display: flex; align-items: baseline; gap: 6px; margin-bottom: 1rem; }
    .water-num      { font-size: 36px; font-weight: 700; color: var(--text); }
    .water-goal     { font-size: 13px; color: var(--text-muted); }
    .water-prog     { height: 5px; background: var(--border); border-radius: 99px; margin-bottom: 1.25rem; overflow: hidden; }
    .water-prog-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s ease; }
    .water-cups     { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
    .cup {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; user-select: none; transition: transform 0.1s;
    }
    .cup:active      { transform: scale(0.94); }
    .cup.filled      { background: var(--accent-bg); border-color: var(--accent-border); }
    .cup i           { font-size: 22px; color: var(--text-muted); }
    .cup.filled i    { color: var(--accent); }
    .cup span        { font-size: 10px; color: var(--text-muted); font-weight: 500; }
    .cup.filled span { color: var(--accent); }
    .water-actions   { display: flex; gap: 8px; }
    .water-actions input {
      flex: 1; padding: 11px 12px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
      font-size: 16px; color: var(--text); font-family: var(--font); outline: none;
    }
    .water-actions input:focus { border-color: var(--accent); }
    .water-actions button {
      padding: 11px 14px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; font-weight: 600; color: var(--text);
      cursor: pointer; font-family: var(--font); white-space: nowrap;
    }
    .water-actions button:active { background: var(--border); }

    /* ── NOTES (drawer) ──────────────────────────────────────────── */
    .notes-ta {
      width: 100%; min-height: 58dvh;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; font-size: 16px; line-height: 1.7;
      color: var(--text); font-family: var(--font); resize: none; outline: none;
    }
    .notes-ta:focus  { border-color: var(--accent); }
    .notes-ta::placeholder { color: var(--text-muted); }
    .notes-meta { font-size: 12px; color: var(--text-muted); margin-top: 8px; text-align: right; }
  </style>
</head>
<body>
<div class="app">
  <div class="dash">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div>
        <div class="date-label" id="date-label"></div>
        <div class="today-label">Today</div>
      </div>
      <div class="icon-row">
        <div class="icon-btn" onclick="openDrawer('water')" aria-label="Water tracker">
          <i class="ti ti-droplet"></i>
        </div>
        <div class="icon-btn" onclick="openDrawer('notes')" aria-label="Brain dump">
          <i class="ti ti-notes"></i>
        </div>
      </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0 of 11 done</div>
    </div>

    <!-- HABITS -->
    <div class="section">
      <div class="section-title">Habits</div>
      <div class="habits">
        <div class="habit-card" id="hab-sleep" onclick="toggleHabit('sleep')">
          <i class="ti ti-moon habit-icon"></i>
          <div class="habit-name">Sleep</div>
          <div class="habit-sub">7–9 hrs</div>
          <div class="check-circle">✓</div>
        </div>
        <div class="habit-card" id="hab-exercise" onclick="toggleHabit('exercise')">
          <i class="ti ti-run habit-icon"></i>
          <div class="habit-name">Exercise</div>
          <div class="habit-sub">move</div>
          <div class="check-circle">✓</div>
        </div>
        <div class="habit-card" id="hab-water" onclick="toggleHabit('water')">
          <i class="ti ti-droplet habit-icon"></i>
          <div class="habit-name">Water</div>
          <div class="habit-sub">2–3 L</div>
          <div class="check-circle">✓</div>
        </div>
      </div>
    </div>

    <!-- TOP 3 -->
    <div class="section">
      <div class="section-title">Top 3</div>
      <div class="top3-list">
        <div class="top3-row">
          <div class="top3-num">1</div>
          <input class="top3-input" id="t1" placeholder="What matters most today?" oninput="save()" />
          <button class="top3-btn" id="t1c" onclick="toggleTop3(1)" aria-label="Mark done">✓</button>
        </div>
        <div class="top3-row">
          <div class="top3-num">2</div>
          <input class="top3-input" id="t2" placeholder="Second priority" oninput="save()" />
          <button class="top3-btn" id="t2c" onclick="toggleTop3(2)" aria-label="Mark done">✓</button>
        </div>
        <div class="top3-row">
          <div class="top3-num">3</div>
          <input class="top3-input" id="t3" placeholder="Third priority" oninput="save()" />
          <button class="top3-btn" id="t3c" onclick="toggleTop3(3)" aria-label="Mark done">✓</button>
        </div>
      </div>
    </div>

    <!-- MIT -->
    <div class="section">
      <div class="section-title">Most important task</div>
      <div class="mit-box">
        <div class="mit-badge">MIT</div>
        <input class="mit-input" id="mit" placeholder="The one thing that counts" oninput="save()" />
      </div>
    </div>

    <!-- DEEP WORK -->
    <div class="section">
      <div class="section-title">Deep work</div>
      <div class="deep-work">
        <div class="block-card" id="dw-1" onclick="toggleBlock(1)">
          <i class="ti ti-brain bi"></i>
          <div>
            <div class="block-name">Block 1</div>
            <div class="block-sub">morning</div>
          </div>
          <div class="block-dot">✓</div>
        </div>
        <div class="block-card" id="dw-2" onclick="toggleBlock(2)">
          <i class="ti ti-brain bi"></i>
          <div>
            <div class="block-name">Block 2</div>
            <div class="block-sub">afternoon</div>
          </div>
          <div class="block-dot">✓</div>
        </div>
      </div>
    </div>

    <!-- SHUTDOWN -->
    <div class="section">
      <div class="section-title">Shutdown ritual</div>
      <div class="shutdown-list">
        <div class="sd-row" id="sd-plan" onclick="toggleSD('plan')">
          <i class="ti ti-calendar-check sd-icon"></i>
          <div class="sd-text">Tomorrow planned</div>
          <div class="sd-dot">✓</div>
        </div>
        <div class="sd-row" id="sd-brain" onclick="toggleSD('brain')">
          <i class="ti ti-brain sd-icon"></i>
          <div class="sd-text">Brain reset</div>
          <button class="help-btn" onclick="openHelp('brain',event)" aria-label="What is brain reset?">?</button>
          <div class="sd-dot">✓</div>
        </div>
        <div class="sd-row" id="sd-env" onclick="toggleSD('env')">
          <i class="ti ti-plant sd-icon"></i>
          <div class="sd-text">Environment reset</div>
          <button class="help-btn" onclick="openHelp('env',event)" aria-label="What is environment reset?">?</button>
          <div class="sd-dot">✓</div>
        </div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetDay()">↺ Reset for new day</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Side panel">
  <div class="drawer-header">
    <i class="ti" id="drawer-icon" style="font-size:22px;color:var(--text-secondary)"></i>
    <div class="drawer-title" id="drawer-title"></div>
    <button class="close-btn" onclick="closeDrawer()" aria-label="Close">
      <i class="ti ti-x"></i>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<!-- HELP BOTTOM SHEET -->
<div class="popup-back" id="popup-back" onclick="closeHelp()">
  <div class="popup" onclick="event.stopPropagation()" role="dialog" aria-modal="true">
    <div class="popup-pill"></div>
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-desc"  id="popup-desc"></div>
    <ul class="popup-list"   id="popup-list"></ul>
    <button class="popup-close-btn" onclick="closeHelp()">Got it</button>
  </div>
</div>

<script>
/* ── STATE ─────────────────────────────────────────────────────── */
const TODAY = new Date().toDateString();
const KEY   = 'adhd_dashboard_v1';

function getState() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY) || '{}');
    if (s.date !== TODAY) {
      // new day — keep notes, reset everything else
      return { date: TODAY, habits:{}, top3:{}, done:{}, mit:'', dw:{}, sd:{}, water:0, notes: s.notes || '' };
    }
    return s;
  } catch {
    return { date: TODAY, habits:{}, top3:{}, done:{}, mit:'', dw:{}, sd:{}, water:0, notes:'' };
  }
}
function persist(s) { localStorage.setItem(KEY, JSON.stringify(s)); }

/* ── TOGGLES ───────────────────────────────────────────────────── */
function toggleHabit(k) { const s=getState(); s.habits[k]=!s.habits[k]; persist(s); render(s); }
function toggleTop3(n)  { const s=getState(); s.done[n]=!s.done[n];     persist(s); render(s); }
function toggleBlock(n) { const s=getState(); s.dw[n]=!s.dw[n];         persist(s); render(s); }
function toggleSD(k)    { const s=getState(); s.sd[k]=!s.sd[k];         persist(s); render(s); }

/* ── TEXT SAVE ─────────────────────────────────────────────────── */
function save() {
  const s = getState();
  s.top3 = {
    1: document.getElementById('t1').value,
    2: document.getElementById('t2').value,
    3: document.getElementById('t3').value,
  };
  s.mit = document.getElementById('mit').value;
  persist(s);
  updateProgress(s);
}

/* ── RESET ─────────────────────────────────────────────────────── */
function resetDay() {
  if (!confirm('Reset today? Your notes will be kept.')) return;
  const notes = getState().notes || '';
  persist({ date: TODAY, habits:{}, top3:{}, done:{}, mit:'', dw:{}, sd:{}, water:0, notes });
  render(getState());
  ['t1','t2','t3','mit'].forEach(id => { document.getElementById(id).value = ''; });
}

/* ── RENDER ────────────────────────────────────────────────────── */
function render(s) {
  // habits
  ['sleep','exercise','water'].forEach(h =>
    document.getElementById('hab-'+h).classList.toggle('done', !!s.habits[h])
  );
  // top 3
  [1,2,3].forEach(n => {
    document.getElementById('t'+n+'c').classList.toggle('done', !!s.done[n]);
    const inp = document.getElementById('t'+n);
    if (s.top3 && s.top3[n] && !inp.value) inp.value = s.top3[n];
    inp.style.textDecoration = s.done[n] ? 'line-through' : '';
    inp.style.opacity        = s.done[n] ? '0.45' : '1';
  });
  // MIT
  const mitEl = document.getElementById('mit');
  if (s.mit && !mitEl.value) mitEl.value = s.mit;
  // deep work
  [1,2].forEach(n => document.getElementById('dw-'+n).classList.toggle('done', !!s.dw[n]));
  // shutdown
  ['plan','brain','env'].forEach(k =>
    document.getElementById('sd-'+k).classList.toggle('done', !!s.sd[k])
  );
  updateProgress(s);
}

function updateProgress(s) {
  const checks = [
    s.habits.sleep, s.habits.exercise, s.habits.water,
    s.done[1], s.done[2], s.done[3],
    s.dw[1], s.dw[2],
    s.sd.plan, s.sd.brain, s.sd.env,
  ];
  const done  = checks.filter(Boolean).length;
  const total = checks.length;
  document.getElementById('progress').style.width = Math.round(done / total * 100) + '%';
  document.getElementById('progress-label').textContent = done + ' of ' + total + ' done';
}

/* ── DRAWER ────────────────────────────────────────────────────── */
function openDrawer(type) {
  document.getElementById('drawer-title').textContent = type === 'water' ? 'Water tracker' : 'Brain dump';
  document.getElementById('drawer-icon').className    = 'ti ti-' + (type === 'water' ? 'droplet' : 'notes');
  document.getElementById('drawer-body').innerHTML    = type === 'water' ? buildWater() : buildNotes();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

/* ── WATER ─────────────────────────────────────────────────────── */
function buildWater() {
  const s   = getState();
  const ml  = s.water || 0;
  const pct = Math.min(100, Math.round(ml / 2500 * 100));
  const disp = ml >= 1000 ? (ml / 1000).toFixed(1) + 'L' : ml + 'ml';
  const cups = Array.from({ length: 8 }, (_, i) => {
    const t = (i + 1) * 250;
    const filled = ml >= t;
    const lbl = t < 1000 ? t + 'ml' : (t / 1000) + 'L';
    return `<div class="cup ${filled ? 'filled' : ''}" onclick="setWater(${t})">
      <i class="ti ti-glass-full"></i><span>${lbl}</span>
    </div>`;
  }).join('');
  return `
    <div class="drawer-section-title">Today's intake</div>
    <div class="water-display">
      <span class="water-num" id="w-num">${disp}</span>
      <span class="water-goal">of 2.5L goal</span>
    </div>
    <div class="water-prog"><div class="water-prog-fill" id="w-bar" style="width:${pct}%"></div></div>
    <div class="water-cups" id="w-cups">${cups}</div>
    <div class="water-actions">
      <input type="number" id="w-in" placeholder="Add ml…" min="1" max="2000" inputmode="numeric" />
      <button onclick="addWater()">Add</button>
      <button onclick="setWater(0)">Reset</button>
    </div>`;
}
function setWater(ml) { const s=getState(); s.water=ml; persist(s); refreshWater(s); }
function addWater() {
  const inp = document.getElementById('w-in');
  const v   = parseInt(inp.value);
  if (!v || v <= 0) return;
  const s = getState();
  s.water = Math.min(5000, (s.water || 0) + v);
  persist(s); inp.value = ''; refreshWater(s);
}
function refreshWater(s) {
  const ml   = s.water || 0;
  const pct  = Math.min(100, Math.round(ml / 2500 * 100));
  const disp = ml >= 1000 ? (ml / 1000).toFixed(1) + 'L' : ml + 'ml';
  const numEl  = document.getElementById('w-num');
  const barEl  = document.getElementById('w-bar');
  const cupsEl = document.getElementById('w-cups');
  if (numEl)  numEl.textContent  = disp;
  if (barEl)  barEl.style.width  = pct + '%';
  if (cupsEl) cupsEl.innerHTML   = Array.from({ length: 8 }, (_, i) => {
    const t = (i + 1) * 250;
    const filled = ml >= t;
    const lbl = t < 1000 ? t + 'ml' : (t / 1000) + 'L';
    return `<div class="cup ${filled ? 'filled' : ''}" onclick="setWater(${t})">
      <i class="ti ti-glass-full"></i><span>${lbl}</span>
    </div>`;
  }).join('');
}

/* ── NOTES ─────────────────────────────────────────────────────── */
function buildNotes() {
  const notes = getState().notes || '';
  return `
    <div class="drawer-section-title">Brain dump — just write</div>
    <textarea class="notes-ta" id="notes-ta"
      placeholder="Thoughts, worries, ideas, things you don't want to forget…"
      oninput="saveNotes()">${notes}</textarea>
    <div class="notes-meta" id="notes-meta">${notes.length} chars · carries over day to day</div>`;
}
function saveNotes() {
  const ta = document.getElementById('notes-ta');
  if (!ta) return;
  const s = getState();
  s.notes = ta.value;
  persist(s);
  const m = document.getElementById('notes-meta');
  if (m) m.textContent = ta.value.length + ' chars · carries over day to day';
}

/* ── HELP POPUPS ───────────────────────────────────────────────── */
const HELP = {
  brain: {
    title: 'Brain reset',
    desc:  'A 5-minute end-of-day routine to offload everything rattling around in your head — so you can actually switch off.',
    items: [
      'Write down any open loops or unfinished thoughts',
      'Note anything you\'re worried about forgetting',
      'Quick review of what you got done today',
      'Set your MIT for tomorrow',
      'Say out loud: "Shutdown complete"',
    ]
  },
  env: {
    title: 'Environment reset (5 min)',
    desc:  'A quick tidy that makes tomorrow\'s you feel like they\'re starting from a good place, not digging out.',
    items: [
      'Fill water bottle',
      'Put things back where they belong',
      'Put tomorrow\'s essentials somewhere obvious',
      'Remove one distraction',
      'Make tomorrow\'s first task easy to start',
    ]
  }
};
function openHelp(type, e) {
  e.stopPropagation();
  const c = HELP[type];
  document.getElementById('popup-title').textContent = c.title;
  document.getElementById('popup-desc').textContent  = c.desc;
  document.getElementById('popup-list').innerHTML    = c.items.map(i => `<li>${i}</li>`).join('');
  document.getElementById('popup-back').classList.add('open');
}
function closeHelp() { document.getElementById('popup-back').classList.remove('open'); }

/* ── INIT ──────────────────────────────────────────────────────── */
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const _now   = new Date();
document.getElementById('date-label').textContent =
  DAYS[_now.getDay()] + ', ' + MONTHS[_now.getMonth()] + ' ' + _now.getDate();

render(getState());
</script>
</body>
</html>
