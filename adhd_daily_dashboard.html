
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { position: relative; overflow: hidden; min-height: 600px; }
.dash { max-width: 520px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }
.date-header { font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.25rem; }
.today-label { font-size: 28px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
.top-bar-left { display: flex; flex-direction: column; }
.icon-row { display: flex; gap: 8px; }
.icon-btn { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: var(--text-secondary); transition: border-color 0.15s; }
.icon-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.progress-bar { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 2rem; overflow: hidden; }
.progress-fill { height: 100%; background: var(--fill-accent); border-radius: 99px; transition: width 0.3s ease; }
.section { margin-bottom: 1.75rem; }
.section-title { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; border-bottom: 0.5px solid var(--border); padding-bottom: 0.5rem; }

.habits { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.habit-card { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.15s; user-select: none; }
.habit-card:hover { border-color: var(--border-strong); }
.habit-card.done { background: var(--bg-success); border-color: var(--border-success); }
.habit-card.done .habit-icon, .habit-card.done .habit-label, .habit-card.done .habit-sub { color: var(--text-success); }
.habit-icon { font-size: 22px; color: var(--text-secondary); }
.habit-label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.habit-sub { font-size: 11px; color: var(--text-muted); }
.check-dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; color: transparent; font-size: 11px; }
.habit-card.done .check-dot { background: var(--fill-success); border-color: var(--fill-success); color: white; }

.top3-list { display: flex; flex-direction: column; gap: 8px; }
.top3-item { display: flex; align-items: center; gap: 12px; }
.top3-num { font-size: 13px; font-weight: 500; color: var(--text-muted); width: 16px; flex-shrink: 0; }
.top3-input { flex: 1; background: transparent; border: none; border-bottom: 0.5px solid var(--border); padding: 6px 0; font-size: 15px; color: var(--text-primary); outline: none; font-family: var(--font-sans); }
.top3-input::placeholder { color: var(--text-muted); }
.top3-input:focus { border-bottom-color: var(--border-accent); }
.top3-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-strong); cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 12px; flex-shrink: 0; transition: all 0.15s; }
.top3-check.done { background: var(--fill-accent); border-color: var(--fill-accent); color: white; }

.mit-box { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.mit-label { font-size: 11px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
.mit-input { flex: 1; background: transparent; border: none; font-size: 16px; font-weight: 500; color: var(--text-primary); outline: none; font-family: var(--font-sans); }
.mit-input::placeholder { color: var(--text-muted); font-weight: 400; }

.deep-work { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.block-card { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; user-select: none; }
.block-card:hover { border-color: var(--border-strong); }
.block-card.done { background: var(--bg-accent); border-color: var(--border-accent); }
.block-icon { font-size: 18px; color: var(--text-secondary); }
.block-card.done .block-icon { color: var(--text-accent); }
.block-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.block-card.done .block-name { color: var(--text-accent); }
.block-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.block-dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; color: transparent; font-size: 10px; flex-shrink: 0; }
.block-card.done .block-dot { background: var(--fill-accent); border-color: var(--fill-accent); color: white; }

.shutdown-list { display: flex; flex-direction: column; gap: 8px; }
.shutdown-item { display: flex; align-items: center; gap: 12px; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 16px; cursor: pointer; user-select: none; transition: all 0.15s; }
.shutdown-item:hover { border-color: var(--border-strong); }
.shutdown-item.done { background: var(--bg-warning); border-color: var(--border-warning); }
.shutdown-icon { font-size: 18px; color: var(--text-secondary); }
.shutdown-item.done .shutdown-icon { color: var(--text-warning); }
.shutdown-text { flex: 1; font-size: 14px; color: var(--text-primary); }
.shutdown-item.done .shutdown-text { color: var(--text-warning); }
.shutdown-dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; color: transparent; font-size: 11px; flex-shrink: 0; }
.shutdown-item.done .shutdown-dot { background: var(--fill-warning); border-color: var(--fill-warning); color: white; }
.help-btn { background: transparent; border: 0.5px solid var(--border); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 12px; flex-shrink: 0; transition: all 0.15s; }
.help-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }

.reset-btn { background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 11px; margin-top: 1.5rem; display: block; margin-left: auto; }
.reset-btn:hover { color: var(--text-secondary); }

/* OVERLAY & DRAWER */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 10; }
.overlay.open { opacity: 1; pointer-events: all; }
.drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(400px, 92vw); background: var(--surface-2); border-left: 0.5px solid var(--border); transform: translateX(100%); transition: transform 0.3s ease; z-index: 20; display: flex; flex-direction: column; overflow: hidden; }
.drawer.open { transform: translateX(0); }
.drawer-header { display: flex; align-items: center; gap: 12px; padding: 1.25rem 1.25rem 1rem; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.drawer-title { font-size: 16px; font-weight: 500; color: var(--text-primary); flex: 1; }
.close-btn { background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 22px; display: flex; align-items: center; padding: 2px; }
.close-btn:hover { color: var(--text-primary); }
.drawer-body { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.5rem; }

/* HELP POPUP */
.popup-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 30; display: flex; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
.popup-backdrop.open { opacity: 1; pointer-events: all; }
.popup { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 16px; padding: 1.5rem; max-width: 380px; width: 100%; }
.popup-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 1rem; }
.popup-title { font-size: 16px; font-weight: 500; color: var(--text-primary); }
.popup-close { background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; display: flex; padding: 2px; flex-shrink: 0; }
.popup-close:hover { color: var(--text-primary); }
.popup-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem; }
.popup-checklist { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.popup-checklist li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--text-primary); line-height: 1.5; }
.popup-check-icon { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-strong); flex-shrink: 0; margin-top: 2px; }

/* WATER */
.water-title { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }
.water-display { display: flex; align-items: baseline; gap: 8px; margin-bottom: 1rem; }
.water-amount { font-size: 32px; font-weight: 500; color: var(--text-primary); }
.water-goal { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
.water-bar-wrap { height: 6px; background: var(--border); border-radius: 99px; margin-bottom: 1rem; overflow: hidden; }
.water-bar { height: 100%; background: #378ADD; border-radius: 99px; transition: width 0.3s ease; }
.water-cups { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0.75rem; }
.cup { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.15s; user-select: none; }
.cup:hover { border-color: var(--border-strong); }
.cup.filled { background: #E6F1FB; border-color: #B5D4F4; }
.cup i { font-size: 20px; color: var(--text-muted); }
.cup.filled i { color: #185FA5; }
.cup span { font-size: 10px; color: var(--text-muted); }
.cup.filled span { color: #185FA5; }
.water-custom { display: flex; gap: 8px; align-items: center; }
.water-custom input { flex: 1; font-size: 14px; font-family: var(--font-sans); }
.notes-area { width: 100%; min-height: 280px; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px; font-size: 15px; line-height: 1.7; color: var(--text-primary); font-family: var(--font-sans); resize: none; outline: none; }
.notes-area:focus { border-color: var(--border-accent); }
.notes-area::placeholder { color: var(--text-muted); }
.notes-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 6px; }
</style>

<h2 class="sr-only">Daily dashboard for ADHD task and habit tracking</h2>

<div class="app">
  <div class="dash">
    <div class="top-bar">
      <div class="top-bar-left">
        <div class="date-header" id="date-label"></div>
        <div class="today-label">Today</div>
      </div>
      <div class="icon-row">
        <div class="icon-btn" onclick="openDrawer('water')" aria-label="Water tracker"><i class="ti ti-droplet" aria-hidden="true"></i></div>
        <div class="icon-btn" onclick="openDrawer('notes')" aria-label="Brain dump"><i class="ti ti-notes" aria-hidden="true"></i></div>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

    <div class="section">
      <div class="section-title">Habits</div>
      <div class="habits">
        <div class="habit-card" id="hab-sleep" onclick="toggleHabit('sleep')">
          <i class="ti ti-moon habit-icon" aria-hidden="true"></i>
          <div class="habit-label">Sleep</div><div class="habit-sub">7–9 hours</div>
          <div class="check-dot">✓</div>
        </div>
        <div class="habit-card" id="hab-exercise" onclick="toggleHabit('exercise')">
          <i class="ti ti-run habit-icon" aria-hidden="true"></i>
          <div class="habit-label">Exercise</div><div class="habit-sub">any movement</div>
          <div class="check-dot">✓</div>
        </div>
        <div class="habit-card" id="hab-water" onclick="toggleHabit('water')">
          <i class="ti ti-droplet habit-icon" aria-hidden="true"></i>
          <div class="habit-label">Water</div><div class="habit-sub">2–3 L</div>
          <div class="check-dot">✓</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Top 3</div>
      <div class="top3-list">
        <div class="top3-item">
          <div class="top3-num">1</div>
          <input class="top3-input" id="t1" placeholder="What matters most today?" oninput="save()" />
          <div class="top3-check" id="t1c" onclick="toggleTop3(1)" aria-label="Mark task 1 done">✓</div>
        </div>
        <div class="top3-item">
          <div class="top3-num">2</div>
          <input class="top3-input" id="t2" placeholder="Second priority" oninput="save()" />
          <div class="top3-check" id="t2c" onclick="toggleTop3(2)" aria-label="Mark task 2 done">✓</div>
        </div>
        <div class="top3-item">
          <div class="top3-num">3</div>
          <input class="top3-input" id="t3" placeholder="Third priority" oninput="save()" />
          <div class="top3-check" id="t3c" onclick="toggleTop3(3)" aria-label="Mark task 3 done">✓</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Most important task</div>
      <div class="mit-box">
        <i class="ti ti-bolt" style="font-size:18px; color:var(--text-warning);" aria-hidden="true"></i>
        <div class="mit-label">MIT</div>
        <input class="mit-input" id="mit" placeholder="The one thing that counts" oninput="save()" />
      </div>
    </div>

    <div class="section">
      <div class="section-title">Deep work</div>
      <div class="deep-work">
        <div class="block-card" id="dw-1" onclick="toggleBlock(1)">
          <i class="ti ti-brain block-icon" aria-hidden="true"></i>
          <div class="block-text"><div class="block-name">Block 1</div><div class="block-sub">morning session</div></div>
          <div class="block-dot">✓</div>
        </div>
        <div class="block-card" id="dw-2" onclick="toggleBlock(2)">
          <i class="ti ti-brain block-icon" aria-hidden="true"></i>
          <div class="block-text"><div class="block-name">Block 2</div><div class="block-sub">afternoon session</div></div>
          <div class="block-dot">✓</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Shutdown ritual</div>
      <div class="shutdown-list">
        <div class="shutdown-item" id="sd-plan" onclick="toggleShutdown('plan')">
          <i class="ti ti-calendar-check shutdown-icon" aria-hidden="true"></i>
          <div class="shutdown-text">Tomorrow planned</div>
          <div class="shutdown-dot">✓</div>
        </div>
        <div class="shutdown-item" id="sd-brain" onclick="toggleShutdown('brain')">
          <i class="ti ti-brain shutdown-icon" aria-hidden="true"></i>
          <div class="shutdown-text">Brain reset</div>
          <button class="help-btn" onclick="openPopup('brain', event)" aria-label="What is brain reset?">?</button>
          <div class="shutdown-dot">✓</div>
        </div>
        <div class="shutdown-item" id="sd-env" onclick="toggleShutdown('env')">
          <i class="ti ti-plant shutdown-icon" aria-hidden="true"></i>
          <div class="shutdown-text">Environment reset</div>
          <button class="help-btn" onclick="openPopup('env', event)" aria-label="What is environment reset?">?</button>
          <div class="shutdown-dot">✓</div>
        </div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetDay()">↺ Reset for new day</button>
  </div>

  <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer" role="dialog" aria-modal="true">
    <div class="drawer-header">
      <i class="ti" id="drawer-icon" style="font-size:20px; color:var(--text-secondary);" aria-hidden="true"></i>
      <div class="drawer-title" id="drawer-title"></div>
      <button class="close-btn" onclick="closeDrawer()" aria-label="Close"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </div>

  <!-- HELP POPUP -->
  <div class="popup-backdrop" id="popup-backdrop" onclick="closePopup()">
    <div class="popup" onclick="event.stopPropagation()" role="dialog" aria-modal="true">
      <div class="popup-header">
        <div class="popup-title" id="popup-title"></div>
        <button class="popup-close" onclick="closePopup()" aria-label="Close"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>
      <div class="popup-desc" id="popup-desc"></div>
      <ul class="popup-checklist" id="popup-checklist"></ul>
    </div>
  </div>
</div>

<script>
const TODAY_KEY = new Date().toDateString();

function getState() {
  try {
    const raw = localStorage.getItem('adhd_dash_v2b');
    const s = raw ? JSON.parse(raw) : {};
    if (s.date !== TODAY_KEY) return { date: TODAY_KEY, habits:{}, top3:{}, top3done:{}, mit:'', dw:{}, sd:{}, water:0, notes: s.notes||'' };
    return s;
  } catch(e) { return { date: TODAY_KEY, habits:{}, top3:{}, top3done:{}, mit:'', dw:{}, sd:{}, water:0, notes:'' }; }
}
function saveState(s) { try { localStorage.setItem('adhd_dash_v2b', JSON.stringify(s)); } catch(e) {} }

function toggleHabit(k) { const s=getState(); s.habits[k]=!s.habits[k]; saveState(s); render(s); }
function toggleTop3(n) { const s=getState(); s.top3done=s.top3done||{}; s.top3done[n]=!s.top3done[n]; saveState(s); render(s); }
function toggleBlock(n) { const s=getState(); s.dw[n]=!s.dw[n]; saveState(s); render(s); }
function toggleShutdown(k) { const s=getState(); s.sd[k]=!s.sd[k]; saveState(s); render(s); }
function save() {
  const s=getState();
  s.top3={1:document.getElementById('t1').value,2:document.getElementById('t2').value,3:document.getElementById('t3').value};
  s.mit=document.getElementById('mit').value;
  saveState(s); updateProgress(s);
}
function resetDay() {
  const s=getState(); const notes=s.notes||'';
  saveState({ date:TODAY_KEY, habits:{}, top3:{}, top3done:{}, mit:'', dw:{}, sd:{}, water:0, notes });
  render(getState());
  ['t1','t2','t3','mit'].forEach(id=>document.getElementById(id).value='');
}

function render(s) {
  ['sleep','exercise','water'].forEach(h=>document.getElementById('hab-'+h).classList.toggle('done',!!s.habits[h]));
  [1,2,3].forEach(n=>{
    document.getElementById('t'+n+'c').classList.toggle('done',!!(s.top3done&&s.top3done[n]));
    const inp=document.getElementById('t'+n);
    if(s.top3&&s.top3[n]&&inp.value==='') inp.value=s.top3[n];
    inp.style.textDecoration=(s.top3done&&s.top3done[n])?'line-through':'';
    inp.style.color=(s.top3done&&s.top3done[n])?'var(--text-muted)':'';
  });
  if(s.mit&&document.getElementById('mit').value==='') document.getElementById('mit').value=s.mit;
  [1,2].forEach(n=>document.getElementById('dw-'+n).classList.toggle('done',!!s.dw[n]));
  ['plan','brain','env'].forEach(k=>document.getElementById('sd-'+k).classList.toggle('done',!!s.sd[k]));
  updateProgress(s);
}

function updateProgress(s) {
  const checks=[s.habits.sleep,s.habits.exercise,s.habits.water,s.top3done&&s.top3done[1],s.top3done&&s.top3done[2],s.top3done&&s.top3done[3],s.dw[1],s.dw[2],s.sd.plan,s.sd.brain,s.sd.env];
  document.getElementById('progress').style.width=Math.round(checks.filter(Boolean).length/checks.length*100)+'%';
}

const POPUP_CONTENT = {
  brain: {
    title: 'Brain reset',
    desc: 'A 5-minute end-of-day routine to offload everything still rattling around in your head — so you can actually switch off.',
    items: [
      'Write down any open loops or unfinished thoughts',
      'Note anything you\'re worried about forgetting',
      'Do a quick review of what you got done today',
      'Set your MIT for tomorrow',
      'Tell yourself: "Shutdown complete"'
    ]
  },
  env: {
    title: 'Environment reset',
    desc: 'A 5-minute tidy that makes tomorrow\'s you feel like they\'re starting from a good place, not digging out.',
    items: [
      'Fill water bottle',
      'Put things back where they belong',
      'Put tomorrow\'s essentials somewhere obvious',
      'Remove one distraction',
      'Make tomorrow\'s first task easy to start'
    ]
  }
};

function openPopup(type, e) {
  e.stopPropagation();
  const c=POPUP_CONTENT[type];
  document.getElementById('popup-title').textContent=c.title;
  document.getElementById('popup-desc').textContent=c.desc;
  document.getElementById('popup-checklist').innerHTML=c.items.map(item=>`
    <li><div class="popup-check-icon"></div>${item}</li>
  `).join('');
  document.getElementById('popup-backdrop').classList.add('open');
}
function closePopup() { document.getElementById('popup-backdrop').classList.remove('open'); }

function openDrawer(type) {
  const body=document.getElementById('drawer-body');
  document.getElementById('drawer-title').textContent=type==='water'?'Water tracker':'Brain dump';
  document.getElementById('drawer-icon').className='ti ti-'+(type==='water'?'droplet':'notes');
  body.innerHTML=type==='water'?buildWaterHTML():buildNotesHTML();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function buildWaterHTML() {
  const s=getState(); const ml=s.water||0; const pct=Math.min(100,Math.round(ml/2500*100));
  const cups=Array.from({length:8},(_,i)=>{
    const t=(i+1)*250; const filled=ml>=t;
    const label=t<1000?t+'ml':(t/1000).toFixed(2).replace(/\.?0+$/,'')+'L';
    return `<div class="cup ${filled?'filled':''}" onclick="addWater(${t})"><i class="ti ti-glass-full" aria-hidden="true"></i><span>${label}</span></div>`;
  }).join('');
  return `<div>
    <div class="water-title">Today's intake</div>
    <div class="water-display"><span class="water-amount" id="w-amount">${ml>=1000?(ml/1000).toFixed(1)+'L':ml+'ml'}</span><span class="water-goal">of 2.5L goal</span></div>
    <div class="water-bar-wrap"><div class="water-bar" id="w-bar" style="width:${pct}%"></div></div>
    <div class="water-cups" id="w-cups">${cups}</div>
    <div class="water-custom"><input type="number" id="w-custom" placeholder="Custom ml" min="0" max="2000" /><button onclick="addCustomWater()">Add</button><button onclick="resetWater()">Reset</button></div>
  </div>`;
}
function addWater(t) { const s=getState(); s.water=t; saveState(s); refreshWater(s); }
function addCustomWater() {
  const inp=document.getElementById('w-custom'); const val=parseInt(inp.value);
  if(!val||val<=0) return;
  const s=getState(); s.water=Math.min(5000,(s.water||0)+val); saveState(s); inp.value=''; refreshWater(s);
}
function resetWater() { const s=getState(); s.water=0; saveState(s); refreshWater(s); }
function refreshWater(s) {
  const ml=s.water||0; const pct=Math.min(100,Math.round(ml/2500*100));
  const a=document.getElementById('w-amount'); const b=document.getElementById('w-bar'); const c=document.getElementById('w-cups');
  if(a) a.textContent=ml>=1000?(ml/1000).toFixed(1)+'L':ml+'ml';
  if(b) b.style.width=pct+'%';
  if(c) c.innerHTML=Array.from({length:8},(_,i)=>{
    const t=(i+1)*250; const filled=ml>=t;
    const label=t<1000?t+'ml':(t/1000).toFixed(2).replace(/\.?0+$/,'')+'L';
    return `<div class="cup ${filled?'filled':''}" onclick="addWater(${t})"><i class="ti ti-glass-full" aria-hidden="true"></i><span>${label}</span></div>`;
  }).join('');
}

function buildNotesHTML() {
  const s=getState(); const notes=s.notes||'';
  return `<div>
    <div class="water-title">Brain dump — just write</div>
    <textarea class="notes-area" id="notes-ta" placeholder="Thoughts, worries, ideas, things you don't want to forget…" oninput="saveNotes()">${notes}</textarea>
    <div class="notes-count" id="notes-count">${notes.length} chars</div>
  </div>`;
}
function saveNotes() {
  const ta=document.getElementById('notes-ta'); if(!ta) return;
  const s=getState(); s.notes=ta.value; saveState(s);
  const c=document.getElementById('notes-count'); if(c) c.textContent=ta.value.length+' chars';
}

const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const now=new Date();
document.getElementById('date-label').textContent=days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate();
render(getState());
</script>
